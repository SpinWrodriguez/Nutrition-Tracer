services:
  nutrition-tracer:
    build: .
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      FATSECRET_CLIENT_ID: "${FATSECRET_CLIENT_ID}"
      FATSECRET_CLIENT_SECRET: "${FATSECRET_CLIENT_SECRET}"
      FATSECRET_SCOPE: "${FATSECRET_SCOPE:-}"
      FATSECRET_REGION: "${FATSECRET_REGION:-AU}"
      FATSECRET_LANGUAGE: "${FATSECRET_LANGUAGE:-en}"
      VITE_OPENAI_KEY: "${VITE_OPENAI_KEY:-}"
      VITE_SUPABASE_URL: "${VITE_SUPABASE_URL:-}"
      VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY:-}"
